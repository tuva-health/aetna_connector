version: 2

models:
  - name: eligibility
    config:
      tags: ["input_layer", "aetna"]
      materialized: table    
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - person_id
              - enrollment_start_date
              - enrollment_end_date
              - "{{ '\"plan\"' if (target.type == 'fabric') else 'plan' }}"
              - payer
              - data_source
          tags: ['tuva_dqi_sev_1', 'dqi']

  - name: medical_claim
    config:
      tags: ["input_layer", "aetna"]
      materialized: table    
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - claim_id
              - claim_line_number
              - data_source
          tags: ['tuva_dqi_sev_1', 'dqi']

  - name: pharmacy_claim
    config:
      tags: ["input_layer", "aetna"]
      materialized: table
    tests: 
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - claim_id
              - claim_line_number
              - data_source
          tags: ['tuva_dqi_sev_1', 'dqi']

  - name: provider_attribution
    config:
      tags: ["input_layer", "aetna"]
      materialized: table    

